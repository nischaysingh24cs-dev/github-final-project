name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Step for checking out the code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Set up Python environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Install required tool dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pynose
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. A step for linting the code after checkout
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 5. A step for executing unit tests using nosetests after the linting step
    - name: Run Unit Tests with Nose
      continue-on-error: true
      run: |
        nosetests
