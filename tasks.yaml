apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: npm
spec:
  workspaces:
    - name: source
  steps:
    - name: install
      image: node:lts-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        npm install
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jasmine
spec:
  workspaces:
    - name: source
  steps:
    - name: test
      image: node:lts-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        npm install
        npm test
