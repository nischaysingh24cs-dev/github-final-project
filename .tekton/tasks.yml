apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test-task
spec:
  workspaces:
    - name: source
  steps:
    - name: run-tests
      image: python:3.10-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env sh
        python -m pip install --upgrade pip
        pip install flake8 pynose
        # Run tests with pynose framework (resolves nosetests deprecations)
        nosetests
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup-task
spec:
  workspaces:
    - name: source
  steps:
    - name: clean-workspace
      image: alpine:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env sh
        echo "Cleaning up workspace..."
        rm -rf *
